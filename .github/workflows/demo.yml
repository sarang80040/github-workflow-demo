name: Animated Greetings Workflow

on:
  push:
    branches:
      - main

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Show Typing Animation
        run: |
          echo "Starting Animation..."
          sleep 1
          text="Welcome to GitHub Workflows!"
          for (( i=0; i<${#text}; i++ )); do
            echo -n "${text:$i:1}"
            sleep 0.1
          done
          echo ""
          sleep 1
          echo "Workflow executed successfully!"

      - name: Spinning Loader Animation
        run: |
          spinner='⠋⠙⠹⠸⠼⠴⠦⠧⠇⠏'
          echo "Loading something awesome..."
          for round in 1 2 3; do
            for (( i=0; i<${#spinner}; i++ )); do
              printf "\r  ${spinner:$i:1} Processing... [Round $round/3]"
              sleep 0.15
            done
          done
          printf "\r  ᯓ★ All rounds complete.      \n"
          echo ""
          echo "ʕ⁠っ⁠•⁠ᴥ⁠•⁠ʔ⁠っ Spinning loader finished successfully!"
